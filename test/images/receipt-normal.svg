<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <!-- 영수증 배경 -->
  <rect width="400" height="560" fill="#ffffff" rx="4"/>
  <rect x="0" y="0" width="400" height="4" fill="#e0e0e0"/>

  <!-- 상단 헤더 -->
  <rect x="20" y="20" width="360" height="60" fill="#f8f8f8" rx="4"/>
  <text x="200" y="45" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">영 수 증</text>
  <text x="200" y="68" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">CASH RECEIPT</text>

  <!-- 구분선 -->
  <line x1="20" y1="90" x2="380" y2="90" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 상호 정보 -->
  <text x="30" y="115" font-family="Arial" font-size="13" font-weight="bold" fill="#333">상호명: 테스트 편의점</text>
  <text x="30" y="138" font-family="Arial" font-size="12" fill="#555">대표자: 홍 길 동</text>
  <text x="30" y="161" font-family="Arial" font-size="12" fill="#555">사업자등록번호: 123-45-67890</text>
  <text x="30" y="184" font-family="Arial" font-size="11" fill="#777">주소: 서울시 강남구 테헤란로 123</text>
  <text x="30" y="205" font-family="Arial" font-size="11" fill="#777">전화: 02-1234-5678</text>

  <!-- 구분선 -->
  <line x1="20" y1="220" x2="380" y2="220" stroke="#ddd" stroke-width="1"/>

  <!-- 거래 정보 헤더 -->
  <rect x="20" y="225" width="360" height="24" fill="#f0f0f0"/>
  <text x="40" y="242" font-family="Arial" font-size="11" fill="#444">품목</text>
  <text x="220" y="242" font-family="Arial" font-size="11" fill="#444">수량</text>
  <text x="290" y="242" font-family="Arial" font-size="11" fill="#444">금액</text>

  <!-- 거래 내역 -->
  <text x="40" y="268" font-family="Arial" font-size="11" fill="#333">삼각김밥 (참치마요)</text>
  <text x="230" y="268" font-family="Arial" font-size="11" fill="#333">2</text>
  <text x="280" y="268" font-family="Arial" font-size="11" fill="#333">2,400원</text>

  <text x="40" y="290" font-family="Arial" font-size="11" fill="#333">생수 (500ml)</text>
  <text x="230" y="290" font-family="Arial" font-size="11" fill="#333">1</text>
  <text x="280" y="290" font-family="Arial" font-size="11" fill="#333">900원</text>

  <text x="40" y="312" font-family="Arial" font-size="11" fill="#333">아메리카노 (L)</text>
  <text x="230" y="312" font-family="Arial" font-size="11" fill="#333">1</text>
  <text x="280" y="312" font-family="Arial" font-size="11" fill="#333">3,200원</text>

  <!-- 구분선 -->
  <line x1="20" y1="326" x2="380" y2="326" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 합계 -->
  <text x="40" y="350" font-family="Arial" font-size="12" fill="#555">공급가액</text>
  <text x="280" y="350" font-family="Arial" font-size="12" fill="#555">5,909원</text>

  <text x="40" y="372" font-family="Arial" font-size="12" fill="#555">부가세 (10%)</text>
  <text x="280" y="372" font-family="Arial" font-size="12" fill="#555">591원</text>

  <!-- 합계 강조 -->
  <rect x="20" y="382" width="360" height="36" fill="#333"/>
  <text x="40" y="406" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">합  계</text>
  <text x="260" y="406" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">6,500원</text>

  <!-- 결제 정보 -->
  <text x="40" y="438" font-family="Arial" font-size="11" fill="#555">결제방법: 현금</text>
  <text x="220" y="438" font-family="Arial" font-size="11" fill="#555">승인번호: 98765432</text>
  <text x="40" y="458" font-family="Arial" font-size="11" fill="#777">거래일시: 2026-03-23 14:30:22</text>

  <!-- 구분선 -->
  <line x1="20" y1="470" x2="380" y2="470" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 하단 -->
  <text x="200" y="498" font-family="Arial" font-size="10" text-anchor="middle" fill="#999">이 영수증은 부가가치세법에 의해 발행되었습니다.</text>
  <text x="200" y="516" font-family="Arial" font-size="10" text-anchor="middle" fill="#999">감사합니다.</text>

  <!-- 테두리 -->
  <rect x="1" y="1" width="398" height="558" fill="none" stroke="#e0e0e0" stroke-width="1" rx="4"/>
</svg>
